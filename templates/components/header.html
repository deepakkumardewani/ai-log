<!-- Top App Bar -->
<header class="header">
  <div class="header-left">
    <div class="header-logo">
      <span class="header-logo-icon">&#x2328;</span>
      <span class="header-logo-text">ailog</span>
    </div>
    <div class="header-separator"></div>
    <div class="header-meta">
      {% if let Some(name) = project_name %}
      <a href="combined_transcripts.html" class="header-back-link">&larr; {{ name }}</a>
      {% endif %}
      <span class="header-session-title">{{ session_title }}</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="header-session-stats">
      <span>{{ session_date }}</span>
      <span class="header-stat-sep">&#x2022;</span>
      <span>{{ duration }}</span>
      <span class="header-stat-sep">&#x2022;</span>
      <span>{{ message_count }} msgs</span>
      <span class="header-stat-sep">&#x2022;</span>
      <span>{{ token_total }}</span>
    </div>
    <div class="header-separator"></div>
    <button class="header-btn" id="theme-toggle" title="Toggle theme" type="button" aria-label="Toggle theme">&#x25D0;</button>
  </div>
</header>
